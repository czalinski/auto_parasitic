[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = -<*> +<main.cpp>

lib_deps =
    adafruit/Adafruit INA219
    adafruit/Adafruit SSD1306
    adafruit/Adafruit BusIO

upload_speed = 115200
monitor_speed = 115200

[env:esp32cal]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = -<*> +<calibrate.cpp>

lib_deps =
    adafruit/Adafruit INA219
    adafruit/Adafruit SSD1306
    adafruit/Adafruit BusIO

upload_speed = 115200
monitor_speed = 115200
